name: Build

# Собирает продукт (C# оркестратор: служба + трей + CLI) самодостаточными
# single-file exe под win-x64 и кладёт архив в релизы:
#  - push в main         → обновляет катящийся пре-релиз с тегом "latest"
#  - push тега vX.Y.Z    → постоянный версионный релиз
# Инсталлятор берёт архив по стабильному URL:
#  https://github.com/iMironRU/utm-orchestrator/releases/download/latest/UtmOrchestrator-win-x64.zip

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest          # net8.0-windows (WinForms-трей) собирается только на Windows
    permissions:
      contents: write                # нужно для создания релизов

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained single-file win-x64)
        working-directory: orchestrator
        shell: bash
        run: bash publish.sh

      - name: Package payload zip
        shell: pwsh
        run: Compress-Archive -Path orchestrator/dist/* -DestinationPath UtmOrchestrator-win-x64.zip -Force

      - name: Publish Setup.exe (self-contained — запускается на чистой машине без .NET)
        shell: bash
        run: |
          dotnet publish orchestrator/src/UtmOrchestrator.Setup/UtmOrchestrator.Setup.csproj \
            -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true -o setup-out
          cp setup-out/UtmOrchestrator-Setup.exe .

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UtmOrchestrator-win-x64
          path: |
            UtmOrchestrator-win-x64.zip
            UtmOrchestrator-Setup.exe
          if-no-files-found: error

      - name: Update rolling "latest" pre-release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя сборка (main)
          body: |
            Автосборка из main. Коммит ${{ github.sha }}.

            Установка на новый компьютер: скачайте **UtmOrchestrator-Setup.exe** и запустите.
          prerelease: true
          make_latest: false
          files: |
            UtmOrchestrator-win-x64.zip
            UtmOrchestrator-Setup.exe

      - name: Create versioned release (tag vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            UtmOrchestrator-win-x64.zip
            UtmOrchestrator-Setup.exe
          generate_release_notes: true
          make_latest: true

name: Build

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & test
        working-directory: agent
        run: mvn --batch-mode verify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: utm-binding-agent-${{ github.sha }}
          path: agent/target/utm-binding-agent-*.jar
          if-no-files-found: error

      - name: Update latest pre-release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest (main)
          prerelease: true
          make_latest: false
          files: agent/target/utm-binding-agent-*.jar

      - name: Create versioned release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: agent/target/utm-binding-agent-*.jar
          generate_release_notes: true
          make_latest: true

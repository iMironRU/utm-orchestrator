<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UTM Orchestrator</title>
<style>
  :root {
    --bg: #f4f5f7; --card: #ffffff; --text: #1f2430; --muted: #6b7280;
    --line: #e5e7eb; --ok: #2e7d32; --warn: #b47800; --fault: #c62828; --gray: #9e9e9e;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#12151c; --card:#1b2029; --text:#e7eaf0; --muted:#9aa2b1; --line:#2a2f3a; }
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
  header { padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .title { font-size:20px; font-weight:700; }
  .badge { display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:999px; font-weight:600; font-size:14px; }
  .dot { width:12px; height:12px; border-radius:50%; display:inline-block; }
  .b-ok { background:rgba(46,125,50,.12); color:var(--ok); } .d-ok{ background:var(--ok);}
  .b-warn { background:rgba(180,120,0,.14); color:var(--warn); } .d-warn{ background:var(--warn);}
  .b-fault { background:rgba(198,40,40,.12); color:var(--fault); } .d-fault{ background:var(--fault);}
  .b-gray { background:rgba(158,158,158,.15); color:var(--gray); } .d-gray{ background:var(--gray);}
  .stub { margin-left:auto; color:var(--muted); font-size:13px; }
  main { padding:20px 22px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--line); border-left-width:5px; border-radius:10px; padding:14px 16px; }
  .card.ok{ border-left-color:var(--ok);} .card.warn{ border-left-color:var(--warn);}
  .card.fault{ border-left-color:var(--fault);} .card.gray{ border-left-color:var(--gray);}
  .card .row { display:flex; justify-content:space-between; align-items:baseline; }
  .svc { font-weight:700; font-size:16px; }
  .port { color:var(--muted); font-size:13px; }
  .fsrar { font-variant-numeric: tabular-nums; margin-top:6px; font-size:15px; }
  .state { margin-top:8px; font-weight:600; }
  .state.ok{ color:var(--ok);} .state.warn{ color:var(--warn);} .state.fault{ color:var(--fault);} .state.gray{ color:var(--gray);}
  .reason { margin-top:4px; color:var(--muted); font-size:13px; min-height:16px; }
  .meta { margin-top:8px; color:var(--muted); font-size:12px; }
  footer { padding:12px 22px; color:var(--muted); font-size:12px; border-top:1px solid var(--line); }
</style>
</head>
<body>
  <header>
    <span class="title">UTM Orchestrator</span>
    <span id="overall" class="badge b-gray"><span class="dot d-gray"></span><span id="overall-text">загрузка…</span></span>
    <span class="stub">заглушка панели — дизайн будет наложен</span>
  </header>
  <main>
    <div id="grid" class="grid"></div>
  </main>
  <footer id="footer">Обновление каждые 8 секунд · <span id="ts"></span></footer>

<script>
const cls = v => v==='Ok'?'ok': v==='Faulty'?'fault': v==='Stopped'?'gray':'warn';
const ru = v => v==='Ok'?'Работает': v==='Faulty'?'Сбой': v==='Stopped'?'Остановлен':'—';

async function refresh() {
  try {
    const r = await fetch('/api/status', { cache:'no-store' });
    const d = await r.json();
    const overall = d.faulty>0 ? 'fault' : (d.ok===d.total && d.total>0 ? 'ok' : (d.total===0?'gray':'warn'));
    const ob = document.getElementById('overall');
    ob.className = 'badge b-'+overall;
    ob.querySelector('.dot').className = 'dot d-'+overall;
    document.getElementById('overall-text').textContent =
      d.total===0 ? 'УТМ не найдены' : `${d.ok}/${d.total} в норме` + (d.faulty>0?`, сбоев: ${d.faulty}`:'');

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (const i of d.instances) {
      const c = cls(i.verdict);
      const el = document.createElement('div');
      el.className = 'card '+c;
      el.innerHTML =
        `<div class="row"><span class="svc">${i.service}</span><span class="port">порт ${i.port||'-'}</span></div>
         <div class="fsrar">${i.fsrar||'—'}</div>
         <div class="state ${c}">${ru(i.verdict)}</div>
         <div class="reason">${i.reason||''}</div>
         <div class="meta">токен ${i.serial||'—'} · ГОСТ ${i.gost?'ok':'—'}</div>`;
      grid.appendChild(el);
    }
    document.getElementById('ts').textContent = new Date().toLocaleTimeString('ru-RU');
  } catch (e) {
    document.getElementById('overall-text').textContent = 'служба недоступна';
  }
}
refresh();
setInterval(refresh, 8000);
</script>
</body>
</html>

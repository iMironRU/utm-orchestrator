# Целевая привязка: FSRAR-ID -> (индекс ридера "Aktiv Rutoken ECP <N>", имя службы, порт)
#
# Формат строки:  fsrarId=index,serviceName,port
#
# Индексы и порты взяты из ground truth реального (не выполненного до конца)
# конфига 2UTM — C:\Program Files (x86)\2UTM_vs\config.ini (см. NOTES.md).
# Там же индекс закодирован как nameReader (используем его, а не attrReader —
# тот отражает историческое, а не желаемое состояние).
#
# FSRAR-ID подтверждён на практике (реальный обмен документами / db.ownerId)
# только для двух первых. Для остальных — только серийный номер токена из
# config.ini (в hex, для справки); FSRAR-ID предстоит подтвердить, когда
# соответствующий токен будет физически подключён и просканирован
# (reader-binder --verify покажет serial<->fsrarId по мере подключения).

# Эксперимент 2026-07-09 (поменять местами индексы Transport/Transport2)
# ОПРОВЕРГ гипотезу §6.8 и доказал более важную вещь: RSA-путь (KeyMaster)
# выбирает сертификат АКТИВНЫМ ПОИСКОМ по совпадению с db.ownerId, а не по
# позиции слота (см. NOTES.md §6.9) — один и тот же serial number
# использовался Transport в трёх разных состояниях таблицы ридеров подряд.
# Поэтому индекс/позиция здесь не имеет значения для RSA-пути вообще —
# вернули исходный порядок (совпадает с реальным config.ini 2UTM).

# Transport2 (порт 8081), серийник 44e29578 — подтверждено (см. NOTES.md)
030000903354=0,Transport2,8081

# Transport (порт 8080), серийник 44f94b1a — подтверждено
030000903353=1,Transport,8080

# Transport4 (порт 8083), серийник 44e28e25 — FSRAR-ID не подтверждён
# ????????????=2,Transport4,8083

# Transport3 (порт 8082), серийник 44cd688a — токен физически отсутствует на машине
# ????????????=3,Transport3,8082

# Transport5 (порт 8084), серийник 44e29553 — FSRAR-ID не подтверждён.
# ВНИМАНИЕ: в исходном config.ini у UTM_5/UTM_6 nameReader != attrReader
# (перекрёстное присвоение 4<->5) — похоже на не до конца доведённую
# предыдущую перепривязку. Держим здесь nameReader (желаемое состояние).
# ????????????=4,Transport5,8084

# Transport6 (порт 8085), серийник 44cd659b — FSRAR-ID не подтверждён
# ????????????=5,Transport6,8085
